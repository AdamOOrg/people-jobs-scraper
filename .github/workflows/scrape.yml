name: Weekly Job Scraper

on:
  schedule:
    - cron: '0 13 * * 2'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node index.js
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-results-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Send email with LinkedIn post
        run: |
          POST=$(cat output/linkedin-post-*.txt 2>/dev/null || echo "No post generated this week.")
          DATE=$(date +%Y-%m-%d)
          
          curl -s --request POST \
            --url https://api.sendgrid.com/v3/mail/send \
            --header "Authorization: Bearer ${{ secrets.SENDGRID_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data "{
              \"personalizations\": [{\"to\": [{\"email\": \"adam@openorg.fyi\"}]}],
              \"from\": {\"email\": \"adam@openorg.fyi\", \"name\": \"Job Scraper\"},
              \"subject\": \"Weekly People & HR Jobs — ${DATE}\",
              \"content\": [{
                \"type\": \"text/plain\",
                \"value\": $(echo "$POST" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
              }]
            }"

      - name: Print LinkedIn post draft
        run: |
          echo "=================================="
          echo "📣 LINKEDIN POST DRAFT:"
          echo "=================================="
          cat output/linkedin-post-*.txt 2>/dev/null || echo "No post generated"
